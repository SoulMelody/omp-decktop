name: Release Desktop (ZH)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.14"
  GO_VERSION: "1.25"
  APP_NAME: "omp-decktop"

jobs:
  # ─── Build Chinese frontend + Go desktop exe on Windows ───────────────────
  build-windows:
    name: Windows x64 · ZH desktop
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # ── Toolchain ──────────────────────────────────────────────────────────
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # ── Dependencies ───────────────────────────────────────────────────────
      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      # ── Chinese frontend ───────────────────────────────────────────────────
      - name: Build Chinese frontend (l10n + dist-zh)
        run: bun run build:zh

      # ── Go desktop binary ──────────────────────────────────────────────────
      - name: Install Wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Generate Windows syso resource
        shell: pwsh
        run: |
          Set-Location "apps\desktop\build"
          wails3 generate syso -arch amd64 -icon windows\icon.ico -manifest windows\wails.exe.manifest -info windows\info.json -out ..\wails_windows_amd64.syso

      - name: Build Go desktop exe (production)
        working-directory: apps\desktop
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build -tags production -trimpath -buildvcs=false -ldflags="-w -s -H windowsgui" -o bin\${{ env.APP_NAME }}.exe

      - name: Clean up syso
        working-directory: apps\desktop
        run: Remove-Item -ErrorAction SilentlyContinue *.syso

      # ── Assemble release zip ───────────────────────────────────────────────
      - name: Assemble release package
        shell: pwsh
        run: |
          $release = "${{ env.APP_NAME }}-zh"
          New-Item -ItemType Directory -Force -Path "$release/apps/server/src"
          New-Item -ItemType Directory -Force -Path "$release/apps/web/dist-zh"
          New-Item -ItemType Directory -Force -Path "$release/packages"

          # Desktop exe
          Copy-Item "apps\desktop\bin\${{ env.APP_NAME }}.exe" "$release/"

          # Server source + package.json (system Bun executes TS directly)
          Copy-Item -Recurse -Path "apps\server\src\*" -Destination "$release/apps/server/src/"
          Copy-Item "apps\server\package.json" "$release/apps/server/"

          # Chinese web frontend
          Copy-Item -Recurse -Path "apps\web\dist-zh\*" -Destination "$release/apps/web/dist-zh/"

          # Starter content
          Copy-Item -Recurse -Path "starter-skills" -Destination "$release/starter-skills"
          Copy-Item -Recurse -Path "starter-extensions" -Destination "$release/starter-extensions"

          # Protocol workspace package
          Copy-Item -Recurse -Path "packages\protocol" -Destination "$release/packages/protocol"

          # Root workspace config + lockfile (for production install)
          Copy-Item "package.json" "$release/"
          Copy-Item "tsconfig.base.json" "$release/"
          Copy-Item "bun.lock" "$release/"

          # Install only production dependencies (no Vite/React/Tailwind/devDeps)
          Set-Location $release
          bun install --production --ignore-scripts --frozen-lockfile
          Set-Location ".."

          # Launcher script
          "@echo off`r`ntitle omp-decktop`r`necho Starting omp-decktop...`r`necho Requires Bun >= 1.3.14 on PATH: https://bun.sh`r`nstart `"`" `"%~dp0${{ env.APP_NAME }}.exe`"" | Out-File -Encoding ASCII "$release/start.bat"

          # Zip it
          Compress-Archive -Path "$release/*" -DestinationPath "${{ env.APP_NAME }}-v${{ github.ref_name }}-win-x64-zh.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-win-x64-zh
          path: ${{ env.APP_NAME }}-v${{ github.ref_name }}-win-x64-zh.zip
          retention-days: 30

  # ─── Create GitHub Release with artifact ──────────────────────────────────
  release:
    name: Create Release
    needs: [build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: true
